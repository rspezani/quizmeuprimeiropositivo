<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste: Você está perdendo sua janela fértil?</title>
<script>
!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version="2.0";n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,"script","https://connect.facebook.net/en_US/fbevents.js");

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#12082a;--bg2:#1a0d38;--card:#221048;--card2:#2d1660;--border:rgba(180,130,255,.18);--border2:rgba(180,130,255,.30);--purple:#8b45c8;--pl:#b87fff;--pl2:#d4b0ff;--rose:#e8609a;--rose2:#ff8fc0;--white:#f0eaff;--muted:#9880c0;--fd:"Cormorant Garamond",serif;--fb:"Jost",sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:var(--fb);font-weight:300;line-height:1.7;overflow-x:hidden;min-height:100vh;}
body::before{content:"";position:fixed;inset:0;z-index:0;background-image:radial-gradient(circle,rgba(139,69,200,.07) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;}
body::after{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 50% at 90% 10%,rgba(139,69,200,.15) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 10% 90%,rgba(232,96,154,.10) 0%,transparent 60%);pointer-events:none;}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes pop{0%{transform:scale(.95);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(184,127,255,.2)}50%{box-shadow:0 0 40px rgba(184,127,255,.45)}}
.st{background:linear-gradient(90deg,var(--purple),var(--pl),#f0e0ff,var(--pl),var(--purple));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3.5s linear infinite;}
.wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:40px 20px 80px;}
/* HEADER */
.qhdr{text-align:center;margin-bottom:40px;animation:fadeUp .7s ease both;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(139,69,200,.12);border:1px solid rgba(139,69,200,.3);padding:6px 16px;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--pl);margin-bottom:20px;}
.qhdr h1{font-family:var(--fd);font-size:clamp(1.9rem,5vw,3rem);font-weight:700;line-height:1.1;margin-bottom:14px;}
.qhdr p{font-size:.95rem;color:var(--muted);max-width:440px;margin:0 auto 20px;}
.sp{display:inline-flex;align-items:center;gap:10px;background:rgba(232,96,154,.08);border:1px solid rgba(232,96,154,.2);padding:8px 16px;font-size:.75rem;color:var(--rose2);}
.spdot{width:7px;height:7px;border-radius:50%;background:var(--rose);animation:pulse 1.5s ease infinite;}
/* PROGRESS */
.pwrap{margin-bottom:32px;}
.pinfo{display:flex;justify-content:space-between;margin-bottom:10px;}
.plbl{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
.pstep{font-size:.68rem;color:var(--pl);font-weight:600;}
.ptrack{height:4px;background:rgba(180,130,255,.12);border-radius:2px;overflow:hidden;}
.pbar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--purple),var(--pl),var(--rose));width:0%;transition:width .6s cubic-bezier(.4,0,.2,1);}
/* QUESTION */
.qcard{background:var(--card);border:1px solid var(--border2);padding:36px 32px;position:relative;overflow:hidden;display:none;animation:pop .4s ease both;}
.qcard.active{display:block;}
.qcard::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--pl),var(--rose),var(--pl),transparent);background-size:200% auto;animation:shimmer 3s linear infinite;}
.qnum{font-family:var(--fd);font-size:.8rem;color:var(--pl);opacity:.6;letter-spacing:.2em;margin-bottom:16px;text-transform:uppercase;}
.qtxt{font-family:var(--fd);font-size:clamp(1.3rem,3.5vw,1.7rem);font-weight:600;line-height:1.3;margin-bottom:28px;}
/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:center;gap:14px;padding:16px 20px;background:rgba(255,255,255,.03);border:1px solid var(--border);cursor:pointer;transition:all .25s;position:relative;overflow:hidden;font-size:.95rem;color:#d0bef0;}
.opt::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(139,69,200,.12),rgba(232,96,154,.08));opacity:0;transition:opacity .25s;}
.opt:hover{border-color:var(--pl);color:var(--white);transform:translateX(4px);}
.opt:hover::before{opacity:1;}
.opt.sel{border-color:var(--rose);background:rgba(232,96,154,.1);color:var(--white);transform:translateX(4px);}
.opt.sel::before{opacity:1;}
.oltr{width:28px;height:28px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;flex-shrink:0;color:var(--pl);transition:all .25s;}
.opt.sel .oltr{background:var(--rose);border-color:var(--rose);color:#fff;}
/* FEEDBACK */
.fb{margin-top:20px;padding:16px 20px;background:rgba(139,69,200,.08);border-left:3px solid var(--pl);font-size:.88rem;color:var(--pl2);line-height:1.6;display:none;animation:fadeUp .3s ease both;font-style:italic;}
.fb.show{display:block;}
/* NEXT */
.nwrap{margin-top:24px;display:flex;justify-content:flex-end;}
.btnext{display:none;align-items:center;gap:10px;background:linear-gradient(135deg,var(--purple),#6b2fa0);color:var(--white);font-family:var(--fb);font-weight:600;font-size:.88rem;letter-spacing:.06em;text-transform:uppercase;padding:14px 28px;border:none;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;}
.btnext::before{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transition:left .5s;}
.btnext:hover::before{left:100%;}
.btnext:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(139,69,200,.4);}
/* EMAIL */
.escr{display:none;background:var(--card);border:1px solid var(--border2);padding:40px 32px;position:relative;overflow:hidden;animation:pop .4s ease both;}
.escr.active{display:block;}
.escr::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--rose),var(--pl),transparent);background-size:200% auto;animation:shimmer 3s linear infinite;}
.escr h2{font-family:var(--fd);font-size:clamp(1.5rem,4vw,2rem);margin-bottom:10px;font-weight:700;}
.escr p{font-size:.92rem;color:var(--muted);margin-bottom:28px;}
.einput{width:100%;padding:16px 20px;background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--white);font-family:var(--fb);font-size:.95rem;outline:none;transition:border-color .25s;margin-bottom:16px;}
.einput::placeholder{color:var(--muted);}
.einput:focus{border-color:var(--pl);}
.btnres{width:100%;padding:18px;background:linear-gradient(135deg,var(--rose),#a83060);color:var(--white);font-family:var(--fb);font-weight:600;font-size:1rem;letter-spacing:.06em;text-transform:uppercase;border:none;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 8px 30px rgba(232,96,154,.3);position:relative;overflow:hidden;}
.btnres::before{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transition:left .5s;}
.btnres:hover::before{left:100%;}
.btnres:hover{transform:translateY(-2px);}
.skip{display:block;text-align:center;margin-top:14px;font-size:.78rem;color:var(--muted);cursor:pointer;text-decoration:underline;opacity:.7;}
/* RESULT */
.rscr{display:none;animation:pop .5s ease both;}
.rscr.active{display:block;}
.rbox{background:var(--card);border:1px solid var(--border2);padding:40px 32px;position:relative;overflow:hidden;margin-bottom:16px;}
.rbox::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;animation:shimmer 3s linear infinite;background-size:200% auto;}
.rbox.pa::before{background:linear-gradient(90deg,transparent,#60d4a8,#a8f0d4,transparent);}
.rbox.pb::before{background:linear-gradient(90deg,transparent,var(--pl),var(--rose),transparent);}
.rbox.pc::before{background:linear-gradient(90deg,transparent,var(--rose),#ff6b6b,transparent);}
.rbadge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;font-weight:600;margin-bottom:20px;}
.pa .rbadge{background:rgba(96,212,168,.1);border:1px solid rgba(96,212,168,.3);color:#60d4a8;}
.pb .rbadge{background:rgba(184,127,255,.1);border:1px solid rgba(184,127,255,.3);color:var(--pl);}
.pc .rbadge{background:rgba(232,96,154,.1);border:1px solid rgba(232,96,154,.3);color:var(--rose2);}
.rtitle{font-family:var(--fd);font-size:clamp(1.6rem,4vw,2.3rem);font-weight:700;line-height:1.2;margin-bottom:16px;}
.rtxt{font-size:.95rem;color:#c4b0e8;line-height:1.8;margin-bottom:28px;}
.sbars{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.slbl{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.si{display:grid;grid-template-columns:140px 1fr 36px;align-items:center;gap:12px;}
.sn{font-size:.78rem;color:var(--muted);}
.str{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.sf{height:100%;border-radius:3px;width:0;transition:width 1s cubic-bezier(.4,0,.2,1) .3s;}
.sf.pu{background:linear-gradient(90deg,var(--purple),var(--pl));}
.sf.ro{background:linear-gradient(90deg,var(--rose),var(--rose2));}
.sf.te{background:linear-gradient(90deg,#3bb8a0,#60d4c8);}
.sp2{font-size:.78rem;color:var(--pl2);font-weight:600;}
/* CTA */
.rcta{background:var(--card2);border:1px solid var(--border2);padding:32px;position:relative;overflow:hidden;animation:glow 4s ease-in-out infinite;}
.rcta::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pl),var(--rose),var(--pl),transparent);background-size:200% auto;animation:shimmer 2.5s linear infinite;}
.rcta h3{font-family:var(--fd);font-size:1.4rem;margin-bottom:8px;}
.rcta>p{font-size:.88rem;color:var(--muted);margin-bottom:24px;line-height:1.6;}
/* CHAPTERS */
.chs{background:rgba(139,69,200,.08);border:1px solid var(--border);padding:20px;margin-bottom:24px;}
.chlbl{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--pl);margin-bottom:16px;font-weight:600;display:block;}
.chi{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border);}
.chi:last-child{border-bottom:none;padding-bottom:0;}
.chn{font-family:var(--fd);font-size:1.1rem;color:var(--rose);flex-shrink:0;width:52px;font-weight:700;}
.chc{display:flex;flex-direction:column;gap:4px;}
.chc strong{font-size:.9rem;color:var(--white);font-weight:600;}
.chc span{font-size:.8rem;color:var(--muted);line-height:1.5;}
/* COVER */
.cvr{display:flex;justify-content:center;margin-bottom:24px;}
.cvr img{width:160px;border-radius:4px;box-shadow:0 8px 40px rgba(155,89,208,.45),0 0 60px rgba(155,89,208,.12);}
/* PRICE */
.prow{display:flex;align-items:baseline;gap:10px;margin-bottom:20px;}
.pold{font-size:.9rem;color:rgba(200,160,255,.4);text-decoration:line-through;}
.pnew{font-family:var(--fd);font-size:2.6rem;font-weight:700;background:linear-gradient(135deg,#f9a8d4,var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
/* BUMP */
.bump{background:rgba(139,69,200,.07);border:1px dashed rgba(200,132,252,.35);position:relative;overflow:hidden;margin-bottom:20px;}
.bumptop{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pl),var(--rose),transparent);background-size:200% auto;animation:shimmer 3s linear infinite;}
.bumpin{padding:22px;}
.btag{font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:var(--pl);margin-bottom:10px;font-weight:600;}
.bcvr{display:flex;justify-content:center;margin:12px 0 14px;}
.bcvr img{width:100%;max-width:300px;border-radius:4px;box-shadow:0 4px 20px rgba(155,89,208,.2);}
.btitle{font-family:var(--fd);font-size:1rem;margin-bottom:10px;color:var(--white);line-height:1.4;}
.bprow{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.bold{font-size:.85rem;color:rgba(200,160,255,.4);text-decoration:line-through;}
.bnew{font-size:.95rem;color:var(--rose2);font-weight:600;}
/* CHECKBOX */
.cklbl{display:flex;align-items:flex-start;gap:12px;cursor:pointer;padding:14px 16px;background:rgba(232,96,154,.06);border:1px solid rgba(232,96,154,.2);transition:background .2s;}
.cklbl:hover{background:rgba(232,96,154,.1);}
.cklbl input{display:none;}
.ckbox{width:22px;height:22px;border:2px solid var(--rose);flex-shrink:0;position:relative;margin-top:1px;transition:background .2s;}
.cklbl input:checked+.ckbox{background:var(--rose);}
.cklbl input:checked+.ckbox::after{content:"✓";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:.85rem;font-weight:700;}
.cktxt{font-size:.88rem;color:#d4c4f0;line-height:1.5;}
/* BUY */
.btnbuy{display:block;width:100%;background:linear-gradient(135deg,#c4527a,#9e3060);color:var(--white);font-family:var(--fb);font-weight:600;font-size:1rem;letter-spacing:.07em;text-transform:uppercase;padding:20px;text-decoration:none;text-align:center;position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s;box-shadow:0 8px 30px rgba(196,82,122,.35);margin-bottom:14px;}
.btnbuy::before{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transition:left .6s;}
.btnbuy:hover::before{left:100%;}
.btnbuy:hover{transform:translateY(-2px);box-shadow:0 16px 48px rgba(196,82,122,.5);}
.guar{font-size:.75rem;color:var(--muted);}
@media(max-width:480px){
.qcard,.escr,.rbox,.rcta{padding:24px 16px;}
.si{grid-template-columns:90px 1fr 32px;}
.bumpin{padding:16px;}
}
</style>
</head>
<body>
<div class="wrap">

<!-- HEADER -->
<div class="qhdr" id="qhdr">
  <div class="eyebrow">✦ &nbsp; Teste rápido &nbsp; ✦</div>
  <h1>Você está perdendo sua<br><span class="st">janela fértil sem perceber?</span></h1>
  <p>Responda 7 perguntas e descubra o que está impedindo o seu positivo todo mês.</p>
  <div class="sp">
    <span class="spdot"></span>
    <span><span id="spc">3.200</span> mulheres já descobriram seu resultado hoje</span>
  </div>
</div>

<!-- PROGRESS -->
<div class="pwrap" id="pwrap" style="display:none;">
  <div class="pinfo">
    <span class="plbl">Seu progresso</span>
    <span class="pstep" id="ptxt">Pergunta 1 de 7</span>
  </div>
  <div class="ptrack"><div class="pbar" id="pbar"></div></div>
</div>

<!-- Q1 -->
<div class="qcard active" id="q1">
  <p class="qnum">Pergunta 01 / 07</p>
  <p class="qtxt">Há quanto tempo você está tentando engravidar?</p>
  <div class="opts">
    <div class="opt" data-q="1" data-v="1" data-s="0"><span class="oltr">A</span>Estou começando agora</div>
    <div class="opt" data-q="1" data-v="2" data-s="1"><span class="oltr">B</span>De 1 a 3 meses</div>
    <div class="opt" data-q="1" data-v="3" data-s="2"><span class="oltr">C</span>De 3 a 6 meses</div>
    <div class="opt" data-q="1" data-v="4" data-s="3"><span class="oltr">D</span>Há mais de 6 meses</div>
  </div>
  <div class="fb" id="fb1"></div>
  <div class="nwrap"><button class="btnext" id="n1" onclick="nxt(2)">Próxima →</button></div>
</div>

<!-- Q2 -->
<div class="qcard" id="q2">
  <p class="qnum">Pergunta 02 / 07</p>
  <p class="qtxt">Você sabe identificar seus dias férteis com precisão?</p>
  <div class="opts">
    <div class="opt" data-q="2" data-v="1" data-s="0"><span class="oltr">A</span>Sim, acompanho direitinho</div>
    <div class="opt" data-q="2" data-v="2" data-s="1"><span class="oltr">B</span>Tenho uma ideia mas não tenho certeza</div>
    <div class="opt" data-q="2" data-v="3" data-s="2"><span class="oltr">C</span>Uso só o aplicativo de ciclo</div>
    <div class="opt" data-q="2" data-v="4" data-s="3"><span class="oltr">D</span>Não, não sei como fazer isso</div>
  </div>
  <div class="fb" id="fb2"></div>
  <div class="nwrap"><button class="btnext" id="n2" onclick="nxt(3)">Próxima →</button></div>
</div>

<!-- Q3 -->
<div class="qcard" id="q3">
  <p class="qnum">Pergunta 03 / 07</p>
  <p class="qtxt">Você já ouviu falar em muco cervical como sinal de fertilidade?</p>
  <div class="opts">
    <div class="opt" data-q="3" data-v="1" data-s="0"><span class="oltr">A</span>Sim, já uso esse sinal</div>
    <div class="opt" data-q="3" data-v="2" data-s="1"><span class="oltr">B</span>Já ouvi falar mas não sei usar</div>
    <div class="opt" data-q="3" data-v="3" data-s="2"><span class="oltr">C</span>Ouvi falar agora pela primeira vez</div>
    <div class="opt" data-q="3" data-v="4" data-s="3"><span class="oltr">D</span>Nunca ouvi falar nisso</div>
  </div>
  <div class="fb" id="fb3"></div>
  <div class="nwrap"><button class="btnext" id="n3" onclick="nxt(4)">Próxima →</button></div>
</div>

<!-- Q4 -->
<div class="qcard" id="q4">
  <p class="qnum">Pergunta 04 / 07</p>
  <p class="qtxt">Você já mediu sua temperatura basal para acompanhar a ovulação?</p>
  <div class="opts">
    <div class="opt" data-q="4" data-v="1" data-s="0"><span class="oltr">A</span>Sim, faço isso todos os dias</div>
    <div class="opt" data-q="4" data-v="2" data-s="1"><span class="oltr">B</span>Já tentei mas não mantive a rotina</div>
    <div class="opt" data-q="4" data-v="3" data-s="2"><span class="oltr">C</span>Conheço o método mas nunca fiz</div>
    <div class="opt" data-q="4" data-v="4" data-s="3"><span class="oltr">D</span>Não sei o que é isso</div>
  </div>
  <div class="fb" id="fb4"></div>
  <div class="nwrap"><button class="btnext" id="n4" onclick="nxt(5)">Próxima →</button></div>
</div>

<!-- Q5 -->
<div class="qcard" id="q5">
  <p class="qnum">Pergunta 05 / 07</p>
  <p class="qtxt">Como você descreveria sua alimentação e rotina de sono atualmente?</p>
  <div class="opts">
    <div class="opt" data-q="5" data-v="1" data-s="0"><span class="oltr">A</span>Cuido muito da alimentação e durmo bem</div>
    <div class="opt" data-q="5" data-v="2" data-s="1"><span class="oltr">B</span>Me alimento razoável mas o sono varia</div>
    <div class="opt" data-q="5" data-v="3" data-s="2"><span class="oltr">C</span>Como mal e durmo pouco por causa da rotina</div>
    <div class="opt" data-q="5" data-v="4" data-s="3"><span class="oltr">D</span>Não presto atenção nisso, não sabia que importava</div>
  </div>
  <div class="fb" id="fb5"></div>
  <div class="nwrap"><button class="btnext" id="n5" onclick="nxt(6)">Próxima →</button></div>
</div>

<!-- Q6 -->
<div class="qcard" id="q6">
  <p class="qnum">Pergunta 06 / 07</p>
  <p class="qtxt">Você sente que está fazendo tudo certo mas o resultado simplesmente não vem?</p>
  <div class="opts">

// Counter

// Options
document.querySelectorAll('.opt').forEach(function(o){
  o.addEventListener('click',function(){
    var q=this.dataset.q,v=this.dataset.v,s=parseInt(this.dataset.s);
    document.querySelectorAll('.opt[data-q="'+q+'"]').forEach(function(x){x.classList.remove('sel');});

function nxt(n){
  document.getElementById('q'+(n-1)).classList.remove('active');
  document.getElementById('pwrap').style.display='block';
  document.getElementById('pbar').style.width=(((n-1)/7)*100)+'%';
  document.getElementById('ptxt').textContent='Pergunta '+n+' de 7';
